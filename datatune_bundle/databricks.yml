bundle:
  name: salesforce_lakeflow_bundle

include:
  - resources/*.yml 

variables:
  env:
    default: dev    
    
targets:
  dev:
    variables:
      env: dev
    mode: development
    default: true
    workspace: 
      root_path: /Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

  test:
    variables:
      env: test
    mode: production
    workspace:
      root_path: /Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

  prod:
    variables:
      env: prod
    mode: production 
    workspace: 
      root_path: /Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}


resources:
  schemas:
    sales:
      name: sales
      catalog_name: silver_${var.env}
    sales_ops:
      name: sales_ops
      catalog_name: silver_${var.env}