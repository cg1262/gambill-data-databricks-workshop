resources:
  jobs:
    lfc_salesforce_job:
      name: lfc_salesforce_${var.env} job
      tasks:
        - task_key: lfc_salesforce_${var.env}_job
          pipeline_task:
            pipeline_id: 1982519d-8c2f-4d51-88ce-699bb00bb0d1
          run_if: ALL_SUCCESS
          timeout_seconds: 0
      email_notifications: {}
